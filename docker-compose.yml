services:
  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    volumes:
      - ./data/library:/music:ro
      - navidrome_data:/data
    ports:
      - "15000:4533"

  harmonia-backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./data:/data
    env_file: .env
    ports:
      - "15001:8000"
    depends_on:
      - navidrome

  harmonia-frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "15002:3000"
    depends_on:
      - harmonia-backend

volumes:
  navidrome_data:
